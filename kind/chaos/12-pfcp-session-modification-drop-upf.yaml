# Fault class: Network Packet Loss + Corruption (PFCP Session Modification — DROP/FAR Attack)
# Target: UPF — N4 control path and N3 downlink path (UPF→gNB)
# Expected propagation: Application only (UPF pod stays alive; RAN registration intact)
#   Infrastructure: no pod restart; UPF memory/CPU unaffected
#   Orchestration:  no K8s events; HPA quiescent
#   Application:    downlink GTP-U tunnel severed — UE can send uplink but receives
#                   no downlink; SMF observes FAR update acknowledgement failure;
#                   uplink-only traffic may partially restore the tunnel (per source —
#                   sending data to UPF re-establishes GTP-U state)
# Key signals: upf_downlink_packets_dropped_total counter rising sharply,
#              gNB net_rx from UPF drops to zero,
#              N4 control traffic remains present (SMF↔UPF eth0 path intact),
#              SMF logs: "FAR not found for TEID <x>"
# Attack model: adversary modifies FAR entries associated with the TEID and gNB IP,
#               removing the downlink forwarding rule; modelled as corruption on the N4
#               control channel (invalidates FAR writes) plus GTP-U downlink loss at gNB.
# N6 note: 10.45.0.0/16 is routed via ogstun (intra-pod TUN) — Chaos Mesh cannot reach
#          it via eth0. N3 downlink loss at the gNB is used instead, which severs the
#          UE's downlink data path while leaving uplink intact — matching the source's
#          description of the FAR DROP effect (DN access blocked, uplink may restore tunnel).
# Source: Amponis et al., "Threatening the 5G core via PFCP DoS attacks: the case of
#         blocking UAV communications," EURASIP J. Wireless Comms & Networking, Dec 2022.
#         https://doi.org/10.1186/s13638-022-02204-5
#         ("PFCP Session Modification DoS Attack (DROP)" — Section 4.3)
#
# Apply:  kubectl apply -f 12-pfcp-session-modification-drop-upf.yaml
# Remove: kubectl delete -f 12-pfcp-session-modification-drop-upf.yaml
---
# Object 1 of 2: corrupt N4 PFCP Modification Requests arriving at UPF
# 40 % corruption with high correlation creates burst-corrupted FAR update windows,
# causing the UPF to silently discard or misapply forwarding-rule updates
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: pfcp-modification-drop-n4-corrupt
  namespace: open5gs
spec:
  action: corrupt
  mode: all
  selector:
    namespaces:
      - open5gs
    labelSelectors:
      app.kubernetes.io/name: upf
      app.kubernetes.io/instance: open5gs
  direction: to              # corrupt inbound PFCP Modification Requests (SMF → UPF)
  corrupt:
    corrupt: "40"
    correlation: "60"        # high correlation → burst corruption of a rule-update window
  target:
    mode: all
    selector:
      namespaces:
        - open5gs
      labelSelectors:
        app.kubernetes.io/name: smf
        app.kubernetes.io/instance: open5gs
  duration: "3m"
---
# Object 2 of 2: drop inbound GTP-U at gNB (N3 downlink proxy for N6 effect)
# ogstun (10.45.0.0/16) is intra-pod and unreachable by Chaos Mesh via eth0.
# Dropping GTP-U at the gNB ingress severs downlink while leaving uplink intact,
# matching the FAR DROP behaviour described in the source.
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: pfcp-modification-drop-n3-gnb-loss
  namespace: open5gs
spec:
  action: loss
  mode: all
  selector:
    namespaces:
      - open5gs
    labelSelectors:
      app.kubernetes.io/component: gnb
      app.kubernetes.io/instance: ueransim-gnb
  direction: to              # drop inbound GTP-U at gNB — severs UE downlink only
  loss:
    loss: "100"
    correlation: "0"
  target:
    mode: all
    selector:
      namespaces:
        - open5gs
      labelSelectors:
        app.kubernetes.io/name: upf
        app.kubernetes.io/instance: open5gs
  duration: "3m"