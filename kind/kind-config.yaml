# kind cluster configuration for Open5GS fault injection experiments
# 3-node topology: 1 control-plane + 2 workers (mirrors the old k3d 1-server + 2-agents layout)
#
# Create:  kind create cluster --config k8s/kind-config.yaml
# Delete:  kind delete cluster --name open5gs
apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: open5gs
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: KubeletConfiguration
        evictionHard:
          nodefs.available: "5%"
          imagefs.available: "5%"
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: KubeletConfiguration
        evictionHard:
          nodefs.available: "5%"
          imagefs.available: "5%"
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: KubeletConfiguration
        evictionHard:
          nodefs.available: "5%"
          imagefs.available: "5%"
